name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: cargo check
        run: cargo check --workspace --locked
      - name: cargo clippy
        run: cargo clippy --locked -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: cargo test
        run: cargo test --workspace --locked

  format:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt check
        run: cargo fmt --check

  install-shellcheck:
    name: Shellcheck install.sh
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -q && sudo apt-get install -y --no-install-recommends shellcheck
      - name: Run shellcheck (POSIX sh)
        run: shellcheck -s sh scripts/install.sh

  install-smoke:
    name: Install smoke (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: alpine-x64
            runs-on: ubuntu-latest
            container: alpine:3.19
            setup: apk add --no-cache curl tar ca-certificates
            needs_qemu: false
          - name: ubuntu-x64
            runs-on: ubuntu-latest
            container: ubuntu:22.04
            setup: apt-get update -q && apt-get install -y --no-install-recommends curl ca-certificates
            needs_qemu: false
          - name: ubuntu-arm64
            runs-on: ubuntu-latest
            container: arm64v8/ubuntu:22.04
            setup: apt-get update -q && apt-get install -y --no-install-recommends curl ca-certificates
            needs_qemu: true
          - name: macos
            runs-on: macos-latest
            container: ~
            setup: "true"
            needs_qemu: false
    steps:
      - name: Set up QEMU (arm64 emulation)
        if: matrix.needs_qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites
        shell: sh
        run: ${{ matrix.setup }}

      - name: Smoke 1 — POSIX syntax check
        shell: sh
        run: sh -n scripts/install.sh

      - name: Smoke 2 — --help exits 0 and prints usage
        shell: sh
        run: |
          out=$(sh scripts/install.sh --help)
          echo "$out"
          echo "$out" | grep -i -E 'usage|options' >/dev/null

      - name: Smoke 3 — --help output sanity
        shell: sh
        run: |
          set -e
          out=$(sh scripts/install.sh --help 2>&1)
          # Must print usage and mention the supported flags
          echo "$out" | grep -q -- '--global' || { echo "missing --global in --help output"; exit 1; }
          echo "$out" | grep -q -- '--local' || { echo "missing --local in --help output"; exit 1; }
          echo "$out" | grep -q -- '--dry-run' || { echo "missing --dry-run in --help output"; exit 1; }

      - name: Smoke 4 — platform triple in expected set
        shell: sh
        run: |
          set -e
          os=$(uname -s)
          arch=$(uname -m)
          case "$os/$arch" in
            Linux/x86_64|Linux/aarch64|Darwin/arm64|Darwin/x86_64) echo "OK: $os/$arch";;
            *) echo "Unexpected runner platform: $os/$arch"; exit 1;;
          esac
