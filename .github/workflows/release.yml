name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            use_cross: true
            npm_pkg: cli-linux-x64
            binary: hoangsa-cli

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            use_cross: true
            npm_pkg: cli-linux-arm64
            binary: hoangsa-cli

          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            use_cross: true
            npm_pkg: cli-linux-x64-musl
            binary: hoangsa-cli

          - target: x86_64-apple-darwin
            os: macos-14
            use_cross: false
            npm_pkg: cli-darwin-x64
            binary: hoangsa-cli

          - target: aarch64-apple-darwin
            os: macos-14
            use_cross: false
            npm_pkg: cli-darwin-arm64
            binary: hoangsa-cli

          - target: x86_64-pc-windows-msvc
            os: windows-2022
            use_cross: false
            npm_pkg: cli-windows-x64
            binary: hoangsa-cli.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        working-directory: cli
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        working-directory: cli
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare platform package
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.npm_pkg }}/bin
          cp cli/target/${{ matrix.target }}/release/${{ matrix.binary }} npm/${{ matrix.npm_pkg }}/bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: npm/${{ matrix.npm_pkg }}/bin/
          retention-days: 1

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "cli-*"
          path: npm/
          merge-multiple: false

      - name: Place binaries in bin/
        run: |
          for pkg in npm/cli-*/; do
            mkdir -p "$pkg/bin"
            find "$pkg" -maxdepth 1 -name "hoangsa-cli*" -exec mv {} "$pkg/bin/" \;
          done

      - name: Make binaries executable
        run: chmod +x npm/cli-linux-*/bin/hoangsa-cli npm/cli-darwin-*/bin/hoangsa-cli

      - name: Publish platform packages
        run: |
          for pkg in cli-linux-x64 cli-linux-arm64 cli-linux-x64-musl cli-darwin-x64 cli-darwin-arm64 cli-windows-x64; do
            (cd npm/$pkg && npm publish --access public)
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish hoangsa-cc (base package)
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
